name: LED Core
version: "0.2.1134"
slug: chihiros_led_core
description: Chihiros LED integration, CLI, scheduler, and dashboard for Home Assistant
url: https://github.com/charlie508010/chihiros-led-control-led-beta/tree/main/chihiros_beta
arch:
  - aarch64
  - amd64
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:latest
  amd64: ghcr.io/home-assistant/amd64-base:latest
startup: services
boot: auto
init: false
host_network: true
host_dbus: true
homeassistant_api: true
hassio_api: true
hassio_role: manager
map:
  - config:rw
options:
  source_repository: https://github.com/charlie508010/chihiros-led-control-led-beta.git
  source_branch: main
  github_token: ""
  install_integration: true
  keep_running: true
schema:
  source_repository: str
  source_branch: str
  github_token: password?
  install_integration: bool
  keep_running: bool
ingress: true
ingress_port: 8109
ingress_entry: /
webui: http://[HOST]:[PORT:8109]/
panel_admin: false
panel_icon: mdi:fish
panel_title: LED Core
