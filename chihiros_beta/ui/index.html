<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LED Core</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #081113;
        --panel: #0f1d21;
        --line: rgba(81,154,190,.34);
        --text: #e8eef0;
        --muted: #9dadb2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        min-height: 54px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        background: #1f1f1f;
        border-bottom: 1px solid rgba(255,255,255,.08);
      }
      h1 { margin: 0; font-size: 18px; line-height: 1.2; }
      .sub { color: var(--muted); font-size: 12px; }
      .status { margin-left: auto; color: #65d46e; font-weight: 700; }
      main { width: min(1460px, calc(100vw - 20px)); margin: 0 auto; padding: 12px 0 24px; }
      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }
      chihiros-led-core-card {
        display: block;
        --primary-text-color: var(--text);
        --secondary-text-color: var(--muted);
        --card-background-color: var(--panel);
        --ha-card-background: var(--panel);
      }
      ha-icon {
        display: inline-grid;
        width: var(--mdc-icon-size, 20px);
        height: var(--mdc-icon-size, 20px);
        place-items: center;
        vertical-align: middle;
      }
      ha-icon > svg { width: 100%; height: 100%; display: block; }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title">LED Core</h1>
      <span class="sub">Add-on Dashboard</span>
      <span id="status" class="status">online</span>
    </header>
    <main>
      <section class="panel" id="dashboard"></section>
    </main>

    <script>
      if (!customElements.get("ha-icon")) {
        const iconShapes = {
          "mdi:alert-circle": '<circle cx="12" cy="12" r="9"/><path d="M12 7v6m0 4h.01"/>',
          "mdi:brightness-7": '<circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4m0-14.2-1.4 1.4M6.3 17.7l-1.4 1.4"/>',
          "mdi:calendar-check": '<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M7 3v4m10-4v4M3 10h18m-13 5 2.5 2.5L16 12"/>',
          "mdi:calendar-remove": '<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M7 3v4m10-4v4M3 10h18m-12 6h6"/>',
          "mdi:calendar-sync": '<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M7 3v4m10-4v4M3 10h18m-5 4a4 4 0 0 0-6.8 1M8 14v3h3m-3 1a4 4 0 0 0 6.8-1M16 18v-3h-3"/>',
          "mdi:clock-outline": '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
          "mdi:close": '<path d="M5 5l14 14M19 5 5 19"/>',
          "mdi:content-save-outline": '<path d="M4 3h13l3 3v15H4zM8 3v6h8V3M8 21v-7h8v7"/>',
          "mdi:database-search": '<ellipse cx="10" cy="5" rx="7" ry="3"/><path d="M3 5v6c0 1.7 3.1 3 7 3m7-9v5M3 11v5c0 1.7 3.1 3 7 3m5.5-.5 4 4m-1.5-7a3 3 0 1 1-4.2 4.2 3 3 0 0 1 4.2-4.2z"/>',
          "mdi:delete-outline": '<path d="M4 7h16M9 7V4h6v3m3 0-1 14H7L6 7m4 4v6m4-6v6"/>',
          "mdi:eye": '<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="2.5"/>',
          "mdi:history": '<path d="M3 12a9 9 0 1 0 3-6.7L3 8m0-5v5h5m4-1v5l3 2"/>',
          "mdi:pencil": '<path d="M4 20l4.5-1 10-10-3.5-3.5-10 10zM13.5 7l3.5 3.5"/>',
          "mdi:plus": '<path d="M12 4v16M4 12h16"/>',
          "mdi:power": '<path d="M12 2v10m-5.7-7a9 9 0 1 0 11.4 0"/>',
          "mdi:share-variant": '<circle cx="18" cy="5" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="19" r="2.5"/><path d="M8.3 10.8l7.4-4.5m-7.4 6.9 7.4 4.5"/>',
          "mdi:toggle-switch": '<rect x="2" y="7" width="20" height="10" rx="5"/><circle cx="16.5" cy="12" r="3"/>',
          "mdi:weather-sunset": '<path d="M4 18h16M6 14h12m-9 0a3 3 0 0 1 6 0M12 3v3M4.9 6.5l2.1 2M19.1 6.5l-2.1 2"/>',
          "mdi:white-balance-sunny": '<circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2M5 5l1.5 1.5m11 11L19 19m0-14-1.5 1.5m-11 11L5 19"/>',
        };
        customElements.define("ha-icon", class extends HTMLElement {
          static get observedAttributes() { return ["icon"]; }
          connectedCallback() { this.renderIcon(); }
          attributeChangedCallback() { if (this.isConnected) this.renderIcon(); }
          renderIcon() {
            const shape = iconShapes[this.getAttribute("icon")] || '<circle cx="12" cy="12" r="8"/><path d="M12 8v4m0 4h.01"/>';
            this.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${shape}</svg>`;
          }
        });
      }
    </script>
    <script type="module">
      await import(`./dashboard/chihiros-led-core-card.js?v=${Date.now()}`);

      const status = document.getElementById("status");
      const title = document.getElementById("title");
      let addonDatabase = {};
      let addonKind = "core";
      let addonTitle = "LED Core";
      let enabledTabs = ["led", "config"];
      let installedPlugins = [];
      let pluginAssets = {};

      async function loadPluginAssets(assets = {}) {
        window.ChihirosPlugins = window.ChihirosPlugins || {};
        for (const [pluginId, asset] of Object.entries(assets || {})) {
          if (!asset || !asset.module || pluginId === "led") continue;
          await import(`${asset.module}?v=${encodeURIComponent(asset.version || Date.now())}`);
          if (!window.ChihirosPlugins[pluginId]) throw new Error(`Plugin frontend did not register: ${pluginId}`);
        }
      }

      function defaultTabForKind() {
        return "led";
      }

      function setAddonTitle(value) {
        addonTitle = value || addonTitle;
        document.title = addonTitle;
        title.textContent = addonTitle;
      }

      const hassShell = {
        states: {},
        services: {},
        locale: { language: "de" },
        language: "de",
        callApi: async (method, path) => {
          const normalizedMethod = String(method || "").toUpperCase();
          const normalizedPath = String(path || "").replace(/^\/+/, "");
          if (normalizedMethod === "GET" && normalizedPath.startsWith("states/")) {
            const entityId = normalizedPath.slice("states/".length);
            const response = await fetch(`./api/ha-state?entity_id=${encodeURIComponent(entityId)}`);
            const raw = await response.text();
            let state = {};
            try {
              state = raw ? JSON.parse(raw) : {};
            } catch (_err) {
              const start = raw.indexOf("{");
              const end = raw.lastIndexOf("}");
              if (start < 0 || end <= start) {
                throw new Error(`State Antwort ist kein JSON (${response.status}): ${raw.slice(0, 160)}`);
              }
              state = JSON.parse(raw.slice(start, end + 1));
            }
            if (!response.ok) throw new Error(state.message || `State Fehler ${response.status}: ${entityId}`);
            hassShell.states = { ...hassShell.states, [entityId]: state };
            if (!state) throw new Error(`State nicht gefunden: ${entityId}`);
            return state;
          }
          throw new Error(`Nicht unterstuetzter HA API Aufruf: ${normalizedMethod} ${normalizedPath}`);
        },
        callService: async (domain, service, serviceData = {}, target = {}, returnResponse = false) => {
          const response = await fetch("./api/ha-service", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ domain, service, service_data: serviceData, target, return_response: returnResponse }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            return {
              response: {
                ok: false,
                send_status: "fail",
                send_detail: data.message || data.error || `Home Assistant Service fehlgeschlagen (${response.status})`,
                debug_output: "",
              },
            };
          }
          await refreshDashboard();
          if (
            domain === "chihiros_led_core" &&
            (service === "add_schedule" || service === "set_schedule" || service === "enable_auto_mode")
          ) {
            scheduleVerificationDashboardRefresh();
          }
          return data.result;
        },
        connection: {
          sendMessagePromise: async (message) => {
            if (!message || message.type !== "call_service") return {};
            const response = await fetch("./api/ha-service", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                domain: message.domain,
                service: message.service,
                service_data: message.service_data || {},
                target: message.target || {},
                return_response: Boolean(message.return_response),
              }),
            });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
              return {
                response: {
                  ok: false,
                  send_status: "fail",
                  send_detail: data.message || data.error || `Home Assistant Service fehlgeschlagen (${response.status})`,
                  debug_output: "",
                },
              };
            }
            await refreshDashboard();
            if (
              message.domain === "chihiros_led_core" &&
              (message.service === "add_schedule" || message.service === "set_schedule" || message.service === "enable_auto_mode")
            ) {
              scheduleVerificationDashboardRefresh();
            }
            return data.result;
          },
        },
      };
      let card = null;
      let dashboardBoundaryTimer = null;
      let dashboardVerificationTimer = null;

      function scheduleVerificationDashboardRefresh() {
        if (dashboardVerificationTimer) window.clearTimeout(dashboardVerificationTimer);
        dashboardVerificationTimer = window.setTimeout(() => {
          dashboardVerificationTimer = null;
          refreshDashboard().catch(() => setStatus("offline", false));
        }, 70000);
      }

      function ensureCard() {
        if (card) return card;
        card = document.createElement("chihiros-led-core-card");
        document.getElementById("dashboard").appendChild(card);
        return card;
      }

      function applyCardState(devices = []) {
        if (!card) return;
        hassShell.states = hassShell.states || {};
        card.setConfig({
          default_tab: card.activeTab || defaultTabForKind(addonKind),
          enabled_tabs: enabledTabs,
          plugin_kind: addonKind,
          plugin_title: addonTitle,
          installed_plugins: installedPlugins,
          plugin_assets: pluginAssets,
          language: "de",
          addon_mode: true,
          addon_database: addonDatabase,
          dashboard_debug: Boolean(addonDatabase && addonDatabase.dashboard_debug),
          show_mac: true,
          show_fan_demo: true,
        });
        card.hass = hassShell;
      }

      function setStatus(text, ok = true) {
        status.textContent = text;
        status.style.color = ok ? "#65d46e" : "#ff7373";
      }

      fetch("./api/status")
        .then((response) => response.json())
        .then(async (data) => {
          addonKind = "core";
          enabledTabs = Array.isArray(data.enabled_tabs) ? data.enabled_tabs : enabledTabs;
          installedPlugins = Array.isArray(data.installed_plugins) ? data.installed_plugins : [];
          pluginAssets = data.plugin_assets || {};
          await loadPluginAssets(pluginAssets);
          setAddonTitle(data.plugin_title);
          ensureCard();
          applyCardState(Array.isArray(data.devices) ? data.devices : []);
          setStatus("online", true);
          return refreshDashboard();
        })
        .catch(() => setStatus("offline", false));

      async function refreshDashboard() {
        const response = await fetch("./api/dashboard-state");
        const data = await response.json();
        addonDatabase = data.database || addonDatabase || {};
        addonKind = "core";
        enabledTabs = Array.isArray(data.enabled_tabs) ? data.enabled_tabs : enabledTabs;
        installedPlugins = Array.isArray(data.installed_plugins) ? data.installed_plugins : installedPlugins;
        pluginAssets = data.plugin_assets || pluginAssets;
        await loadPluginAssets(pluginAssets);
        setAddonTitle(data.plugin_title);
        ensureCard();
        hassShell.states = data.states || {};
        applyCardState(Array.isArray(data.devices) ? data.devices : []);
        setStatus("datenbank", true);
        scheduleNextDashboardBoundary();
      }

      function scheduleNextDashboardBoundary() {
        if (dashboardBoundaryTimer) window.clearTimeout(dashboardBoundaryTimer);
        dashboardBoundaryTimer = null;
        const schedules = addonDatabase && addonDatabase.led_schedules ? addonDatabase.led_schedules : {};
        const now = new Date();
        const weekdayNames = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
        const candidates = [];
        Object.values(schedules).flat().forEach((row) => {
          if (!row || row.active === false) return;
          const [startHour, startMinute] = String(row.start || "00:00").split(":").map(Number);
          const [endHour, endMinute] = String(row.end || "00:00").split(":").map(Number);
          const weekdays = new Set((Array.isArray(row.weekdays) ? row.weekdays : ["everyday"]).map((day) => String(day).toLowerCase()));
          for (let offset = 0; offset < 8; offset += 1) {
            const day = new Date(now.getFullYear(), now.getMonth(), now.getDate() + offset);
            if (!weekdays.has("everyday") && !weekdays.has(weekdayNames[day.getDay()])) continue;
            const start = new Date(day.getFullYear(), day.getMonth(), day.getDate(), startHour || 0, startMinute || 0);
            const overnight = ((endHour || 0) * 60 + (endMinute || 0)) <= ((startHour || 0) * 60 + (startMinute || 0));
            const end = new Date(day.getFullYear(), day.getMonth(), day.getDate() + (overnight ? 1 : 0), endHour || 0, endMinute || 0);
            if (start > now) candidates.push(start);
            if (end > now) candidates.push(end);
          }
        });
        if (!candidates.length) return;
        const next = new Date(Math.min(...candidates.map((value) => value.getTime())));
        dashboardBoundaryTimer = window.setTimeout(() => {
          refreshDashboard().catch(() => setStatus("offline", false));
        }, Math.max(100, next.getTime() - Date.now() + 150));
      }

      const sleep = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));

      window.ChihirosAddonApi = {
        installPlugin: async (file) => {
          const response = await fetch("./api/plugins/install", {
            method: "POST",
            headers: { "content-type": "application/gzip" },
            body: file,
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.message || `Plugin installation failed (${response.status})`);
          return data;
        },
        uninstallPlugin: async (plugin) => {
          const response = await fetch("./api/plugins/uninstall", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ plugin }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.message || `Plugin uninstall failed (${response.status})`);
          return data;
        },
        callPluginBackend: async (plugin, action, args = []) => {
          const response = await fetch("./api/plugin-backend", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ plugin, action, args }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.message || `Plugin action failed (${response.status})`);
          return data;
        },
        saveDatabaseConfig: async (payload) => {
          const response = await fetch("./api/dashboard-settings", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.message || "Speichern fehlgeschlagen");
          addonDatabase = data;
          await refreshDashboard();
          return data;
        },
        databaseStatus: async (device = "") => {
          const params = new URLSearchParams();
          if (device) params.set("device", device);
          const suffix = params.toString() ? `?${params.toString()}` : "";
          const response = await fetch(`./api/database-status${suffix}`, { cache: "no-store" });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.message || "Datenbankstatus konnte nicht geladen werden");
          return data;
        },
        runAddonUpdate: async () => {
          const response = await fetch("./api/addon-update", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: "{}",
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.message || `Update fehlgeschlagen (${response.status})`);
          setStatus("Update läuft", true);
          const reloadWhenReady = async () => {
            await sleep(2500);
            for (let attempt = 0; attempt < 60; attempt += 1) {
              try {
                const ready = await fetch(`./api/dashboard-settings?update=${Date.now()}`, { cache: "no-store" });
                if (ready.ok) {
                  window.location.reload();
                  return;
                }
              } catch (_err) {
                // The ingress endpoint is expected to be unavailable while Supervisor replaces the add-on.
              }
              await sleep(1500);
            }
            window.location.reload();
          };
          reloadWhenReady();
          return data;
        },
        refreshDashboard,
        refreshHassStates: refreshDashboard,
      };

      fetch("./api/dashboard-settings")
        .then((response) => response.json())
        .then((data) => {
          addonDatabase = data || {};
          return refreshDashboard();
        })
        .catch(async () => {
        addonDatabase = {};
        ensureCard();
        setStatus("db fehlt", false);
        await refreshDashboard();
      });
    </script>
  </body>
</html>
